spring:
  datasource:
    #jdbc:h2:~/realCapstone
    url: jdbc:h2:tcp://localhost/~/realCapstone
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    properties:
      hibernate:

        #        show_sql: true
        format_sql: true
        default_batch_fetch_size: 1000
        #이거 적는게 제일 무난한 방법(클래스나 컬랙션 위에 각각 적기보다)

    #open-in-view: false
    #false로 되어있으면 트랜젝션 내에서 지연로딩 처리해주어야한다(respository나 service단에서)
    #별도의 패키지를 두어 Service단의 역할과 화면에서의 처리 Service 로직을 분리하는 것이 유지보수에 좋다

  sql:
    init:
      mode: always
      data-locations: classpath:init.sql
  jwt:
    secret: B9B58C124AB734523FE27FF91F17184F3BFC7B6CD78E8A2D9EF4FA716EF83588149EED8ED22BABEA1B7781852F4FBAD9BD6EA4CDA4E15777381BF4415F75B11C


    accessToken:
      expiration: 100000000  # 초 단위 (예: 1시간)
    refreshToken:
      expiration: 100000000  # 7일 (선택사항, 있다면 추가)


logging.level:
  org.hibernate.SQL: debug

oauth:
  kakaoUserInfoUri: https://kapi.kakao.com/v2/user/me

  #http://localhost:8080/swagger-ui/index.html
ai:
  server:
    url: http://172.16.21.144:8000/plan

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true