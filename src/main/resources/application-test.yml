spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
  jwt:
    secret: ${JWT_SECRET}
    accessToken:
      expiration: 100000000
    refreshToken:
      expiration: 100000000

ai:
  server:
    url: ${AI_SERVER_URL}
oauth:
  kakaoUserInfoUri: ${KAKAO_USERINFO_URI}